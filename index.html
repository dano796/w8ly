<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>W8ly - Workout Planner</title>
    <meta
      name="description"
      content="Planifica y registra tus entrenamientos semanales"
    />
    <meta name="author" content="W8ly" />

    <!-- PWA & Mobile App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="W8ly" />
    <meta name="theme-color" content="#000000" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Prevent tap highlight on mobile -->
    <meta name="msapplication-tap-highlight" content="no" />

    <style>
      /* Prevent text selection on touch */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      /* Allow selection for inputs and text areas */
      input,
      textarea,
      [contenteditable] {
        -webkit-touch-callout: default;
        -webkit-user-select: text;
        user-select: text;
      }

      /* Safe area padding for notch devices */
      :root {
        --safe-area-inset-top: env(safe-area-inset-top);
        --safe-area-inset-right: env(safe-area-inset-right);
        --safe-area-inset-bottom: env(safe-area-inset-bottom);
        --safe-area-inset-left: env(safe-area-inset-left);
      }
    </style>
  </head>

  <body>
    <!-- Orientation Lock Overlay -->
    <div id="orientation-overlay" class="orientation-lock-overlay">
      <div class="orientation-lock-content">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="64"
          height="64"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
          <polyline points="17 2 12 7 7 2"></polyline>
        </svg>
        <h2>Gira tu dispositivo</h2>
        <p>Por favor, usa la aplicación en modo vertical</p>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
